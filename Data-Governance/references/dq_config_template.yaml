# 数据质量检查 · 连接配置模板
# 使用时：复制此文件，填入你自己的数仓连接信息和自定义规则，在检查时一并上传。

# ============================
# 数仓连接信息（必须填写）
# ============================
host: 10.0.0.1          # HiveServer2 地址
port: 10000              # HiveServer2 端口
database: dwd_crdt       # 目标数据库名
username: hive_user      # 连接用户名
password: your_password  # 连接密码

# 可选参数
auth_mechanism: LDAP     # 认证机制：LDAP / PLAIN / NOSASL（默认 LDAP）
partition_value: ""      # 检查的目标分区值，留空则自动检测最新分区

# ============================
# 自定义业务规则（可选）
# 支持两种写法：
#   check_type: value_range  —— 简单字段范围检查，免 SQL
#   check_type: custom_sql   —— 复杂业务逻辑，手写 SQL
#
# custom_sql 的 SQL 必须返回问题明细行（而非 COUNT 聚合），
# threshold 为允许的最大问题行数，超过即告警。
# ============================
custom_rules:
  # 示例 1：账户余额与明细之和比对（跨表勾稽，用 custom_sql）
  - rule_id: DQ-CUST-001
    rule_name: 账户余额与明细之和差异检查
    check_type: custom_sql
    table: dwd_crdt_account
    severity: 高
    sql: |
      SELECT
        a.account_id,
        a.balance AS declared_balance,
        COALESCE(SUM(d.amount), 0) AS detail_balance,
        ABS(a.balance - COALESCE(SUM(d.amount), 0)) AS diff
      FROM dwd_crdt_account a
      LEFT JOIN dwd_crdt_txn_detail d
        ON a.account_id = d.account_id
        AND d.dt = '${bizdate}'
      WHERE a.dt = '${bizdate}'
      GROUP BY a.account_id, a.balance
      HAVING ABS(a.balance - COALESCE(SUM(d.amount), 0)) > 0.01
    threshold: 0   # 允许的最大问题行数

  # 示例 2：交易金额极值告警（简单范围检查，用 value_range，无需写 SQL）
  - rule_id: DQ-CUST-002
    rule_name: 单笔交易金额超过 1 亿
    check_type: value_range
    table: dwd_crdt_txn
    field: trade_amt
    condition: "> 100000000"
    severity: 中

  # 示例 3：分区数据缺失检查（自定义 SQL，返回缺失的分区明细行）
  - rule_id: DQ-CUST-003
    rule_name: 近 7 天分区完整性
    check_type: custom_sql
    table: dws_crdt_daily_summary
    severity: 高
    sql: |
      SELECT expected.dt AS missing_dt
      FROM (
        SELECT date_sub(CURRENT_DATE, pos) AS dt
        FROM (SELECT 0 pos UNION ALL SELECT 1 UNION ALL SELECT 2 UNION ALL SELECT 3
              UNION ALL SELECT 4 UNION ALL SELECT 5 UNION ALL SELECT 6) t
      ) expected
      LEFT JOIN dws_crdt_daily_summary actual ON actual.dt = expected.dt
      WHERE actual.dt IS NULL
    threshold: 0   # 0 表示不允许有任何缺失分区
